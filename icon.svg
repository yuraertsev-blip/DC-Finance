<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <rect width="512" height="512" rx="100" fill="#1E293B"/>
    <!-- Diamond top facet -->
    <polygon points="256,80 160,200 352,200" fill="#7DD3FC"/>
    <!-- Diamond left facet -->
    <polygon points="160,200 256,420 256,200" fill="#38BDF8"/>
    <!-- Diamond right facet -->
    <polygon points="352,200 256,420 256,200" fill="#0EA5E9"/>
    <!-- Diamond top-left edge -->
    <polygon points="256,80 160,200 256,200" fill="#BAE6FD"/>
    <!-- Diamond top-right edge -->
    <polygon points="256,80 352,200 256,200" fill="#7DD3FC"/>
    <!-- Shine line -->
    <line x1="200" y1="200" x2="256" y2="100" stroke="white" stroke-width="3" opacity="0.5"/>
    <line x1="312" y1="200" x2="256" y2="100" stroke="white" stroke-width="3" opacity="0.3"/>
</svg>
